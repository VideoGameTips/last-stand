// Point-in-polygon: is (x,y) on a landmass?
function pointInPoly(x,y,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
function isLand(x,y){
  for(const c of CONTINENTS){if(pointInPoly(x,y,c.p))return true}
  return false;
}

function spawnStarterMilitary(){
  WORLD_CITIES.forEach(c=>{
    if(c.status!=='safe')return; // skip Indonesia (already attacked)
    const tier=MIL_RATING[c.id]||1;
    // Place `tier` cannons in a ring, plus one wire ring at the capital for tier ≥ 3.
    for(let i=0;i<tier;i++){
      const a=(i/tier)*Math.PI*2 + (c.id.charCodeAt(0)%7)*.3;
      const rad=24+tier*4;
      const cx=c.x+Math.cos(a)*rad,cy=c.y+Math.sin(a)*rad;
      if(!isLand(cx,cy))continue;
      worldStructures.push({type:'cannon',x:cx,y:cy,cooldown:0,hp:0,maxHp:0,state:'idle'});
    }
    if(tier>=3){
      worldStructures.push({type:'wire',x:c.x,y:c.y,cooldown:0,hp:0,maxHp:0,state:'idle'});
    }
  });
  // Starter Forward Bases: one each at USA, Russia, China (the three founding superpowers).
  const fobDef=WORLD_BUILDS.find(b=>b.id==='fob');
  ['usa','russia','china'].forEach(id=>{
    const c=WORLD_CITIES.find(x=>x.id===id);
    if(!c)return;
    worldStructures.push({type:'fob',x:c.x+18,y:c.y-18,cooldown:0,hp:fobDef.hp,maxHp:fobDef.hp,state:'idle'});
  });
  // UPKR garrison: a Fort flanked by 2 static MG divs guards the antimatter launch site.
  const upkr=FACTION_BASES.find(f=>f.name==='UPKR');
  if(upkr){
    const fortDef=WORLD_BUILDS.find(b=>b.id==='fort');
    const mgDef=WORLD_BUILDS.find(b=>b.id==='mg-div');
    worldStructures.push({type:'fort',x:upkr.x,y:upkr.y,cooldown:0,hp:fortDef.hp,maxHp:fortDef.hp,state:'idle'});
    worldStructures.push({type:'mg-div',x:upkr.x-18,y:upkr.y+8,cooldown:0,hp:mgDef.hp,maxHp:mgDef.hp,target:null,_static:true});
    worldStructures.push({type:'mg-div',x:upkr.x+18,y:upkr.y+8,cooldown:0,hp:mgDef.hp,maxHp:mgDef.hp,target:null,_static:true});
  }
  // KAMW garrison: 3 static long-range artillery cannons guard the D-303 launch site.
  const kamw=FACTION_BASES.find(f=>f.name==='KAMW');
  if(kamw){
    const cannonDef=WORLD_BUILDS.find(b=>b.id==='cannon');
    for(let i=0;i<3;i++){
      const a=(i/3)*Math.PI*2 - Math.PI/2;
      const rad=22;
      worldStructures.push({type:'cannon',x:kamw.x+Math.cos(a)*rad,y:kamw.y+Math.sin(a)*rad,cooldown:0,hp:cannonDef.hp,maxHp:cannonDef.hp,state:'idle'});
    }
  }
}

function inForestAt(x,y){for(const f of FOREST_ZONES)if(Math.hypot(x-f.x,y-f.y)<f.r)return f;return null}
function inSnowyAt(x,y){for(const s of SNOWY_ZONES)if(Math.hypot(x-s.x,y-s.y)<s.r)return s;return null}
function inMountainAt(x,y){for(const m of MOUNTAIN_ZONES)if(Math.hypot(x-m.x,y-m.y)<m.r)return m;return null}
function inToxicGasAt(x,y){for(const t of TOXIC_GAS_ZONES)if(Math.hypot(x-t.x,y-t.y)<t.r)return t;return null}
function inPandemicFogAt(x,y){for(const z of PANDEMIC_ZONES){if((z.hp||0)<=0)continue;if(Math.hypot(x-z.x,y-z.y)<PANDEMIC_FOG_R)return z}return null}
// True if a unit at (ax,ay) cannot detect/target something at (tx,ty) due to fog/forest.
function fogBlocks(ax,ay,tx,ty){
  if(scanActive>0)return false; // satellite scan reveals everything for friendlies
  if(inPandemicFogAt(ax,ay)||inPandemicFogAt(tx,ty))return true;
  if(inForestAt(ax,ay)||inForestAt(tx,ty)){
    return Math.hypot(tx-ax,ty-ay)>FOREST_REVEAL;
  }
  return false;
}

// Simplified national flags drawn into a circle of radius r at origin (0,0).
// Common patterns: hStripes(colors[]), vStripes(colors[]). Some flags add a
// central emblem (a circle / star / etc.) on top of the bands.
function _hStripes(ctx,r,colors){
  const w=r*2,h=r*2,band=h/colors.length;
  for(let i=0;i<colors.length;i++){ctx.fillStyle=colors[i];ctx.fillRect(-r,-r+i*band,w,band+1)}
}
function _vStripes(ctx,r,colors){
  const w=r*2,h=r*2,band=w/colors.length;
  for(let i=0;i<colors.length;i++){ctx.fillStyle=colors[i];ctx.fillRect(-r+i*band,-r,band+1,h)}
}
function _star(ctx,cx,cy,rOuter,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2,rr=i%2===0?rOuter:rOuter*.45;
    const px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.closePath();ctx.fill();
}

  ctx.restore();
  // outline
  ctx.strokeStyle='#000';ctx.lineWidth=Math.max(1.2,1.6*wCam.zoom);
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
}

// ── BFS PATHFINDING ─────────────────────────────────────────────────────
const visitedBuf=new Uint8Array(GRID_W*GRID_H);
function bfs(sc,sr,tc,tr){
  if(sc<0||sc>=GRID_W||sr<0||sr>=GRID_H||tc<0||tc>=GRID_W||tr<0||tr>=GRID_H)return null;
  if(STREET_GRID[sr][sc]!==0||STREET_GRID[tr][tc]!==0)return null;
  if(sc===tc&&sr===tr)return [];
  visitedBuf.fill(0);
  const prev=new Int16Array(GRID_W*GRID_H);prev.fill(-1);
  const q=[sc+sr*GRID_W];visitedBuf[sc+sr*GRID_W]=1;
  const D=[[1,0],[-1,0],[0,1],[0,-1]];
  let found=false;
  while(q.length){
    const idx=q.shift(),c=idx%GRID_W,r=Math.floor(idx/GRID_W);
    if(c===tc&&r===tr){found=true;break}
    for(const [dc,dr] of D){
      const nc=c+dc,nr=r+dr;
      if(nc<0||nc>=GRID_W||nr<0||nr>=GRID_H)continue;
      const ni=nc+nr*GRID_W;
      if(visitedBuf[ni])continue;
      if(STREET_GRID[nr][nc]!==0)continue;
      visitedBuf[ni]=1;prev[ni]=idx;q.push(ni);
    }
  }
  if(!found)return null;
  const path=[];let cur=tc+tr*GRID_W;
  while(cur!==sc+sr*GRID_W){
    path.unshift({col:cur%GRID_W,row:Math.floor(cur/GRID_W)});
    cur=prev[cur];if(cur<0)break;
  }
  return path;
}

function tilePxFor(s,c,r){return{x:s.offset.x+c*TILE+TILE/2,y:s.offset.y+r*TILE+TILE/2}}

function buildLockReason(b){
  if(b.unlockDay&&worldDay<b.unlockDay)return `unlocks on day ${b.unlockDay}`;
  if(b.unlockCheck==='chinaThreat'){
    const cn=WORLD_CITIES.find(c=>c.id==='china');
    if(cn&&cn.status==='safe')return `unlocks when China is under threat`;
  }
  if(b.unlockCheck==='asianLastStand'){
    // Available only when every non-Asian capital is compromised (attacked/fallen/pandemic/scorched/sealed).
    // Exempt: Japan, China, North Korea, South Korea (the Asian holdout coalition).
    const exempt=new Set(['japan','china','north-korea','south-korea','korea','nkorea','skorea']);
    const compromised=new Set(['attacked','fallen','pandemic','scorched','sealed']);
    const stillSafe=WORLD_CITIES.filter(c=>!exempt.has(c.id)&&!compromised.has(c.status));
    if(stillSafe.length>0){
      return `unlocks when world falls (${stillSafe.length} non-Asian nation${stillSafe.length===1?'':'s'} still standing)`;
    }
  }
  return null;
}

  worldBtnEls.forEach(el=>{
    const b=WORLD_BUILDS.find(x=>x.id===el.dataset.id);
    const lockMsg=buildLockReason(b);

    el.classList.toggle('sel',buildMode===b.id);
    el.title=lockMsg||'';
  });
  const stats=document.getElementById('stats');
  if(stats){
    const cn=worldStructures.filter(s=>s.type==='cannon').length;
    const fb=worldStructures.filter(s=>s.type==='fob').length;
    const dv=worldStructures.filter(s=>{const d=WORLD_BUILDS.find(b=>b.id===s.type);return d&&d.mobile}).length;
    const def=Object.values(defenses).filter(d=>!d.result).length;
    const scanStatus=scanActive>0?`<div style="color:#5cf">📡 SCAN ${Math.ceil(scanActive/60)}s</div>`:scanCool>0?`<div style="color:#888">📡 cd ${Math.ceil(scanCool/60)}s</div>`:'';

function renderHotbar(){
  const el=document.getElementById('playerHotbar');
  if(!el)return;
  const playerS=worldStructures.find(u=>u._player&&(u.hp||0)>0);
  const showHotbar=screen==='worldmap'&&!!playerS;
  el.classList.toggle('show',showHotbar);
  if(!showHotbar){el._sig=null;return}
  // Re-render only when slot list or equipped weapon changes
  const sig=playerHotbar.join(',')+'|'+(playerS._weapon||'');
  if(el._sig===sig)return;
  el._sig=sig;
  el.innerHTML='';
  for(const id of playerHotbar){
    const w=PLAYER_WORLD_WEAPONS[id];if(!w)continue;
    const slot=document.createElement('div');
    slot.className='hbSlot'+(playerS._weapon===id?' sel':'');
    slot.style.color=w.color;
    const stat=w.kind==='warper'?'TELEPORT':w.kind==='thrown'?`AOE ${w.aoe}`:w.kind==='melee'?`MELEE ${w.dmg}`:`${w.dmg}·r${w.range}`;
    slot.innerHTML=`<div class="hbX" title="Remove from hotbar">✕</div><div class="hbName">${w.name}</div><div class="hbStat">${stat}</div>`;
    slot.addEventListener('click',ev=>{
      if(ev.target.classList.contains('hbX')){
        ev.stopPropagation();
        const idx=playerHotbar.indexOf(id);
        if(idx>=0)playerHotbar.splice(idx,1);
        if(playerS._weapon===id){
          playerS._weapon=playerHotbar[0]||null;
        }
        el._sig=null;
        renderHotbar();
        return;
      }
      playerS._weapon=id;
      el._sig=null;
      renderHotbar();
    });
    el.appendChild(slot);
  }
}

// ── HORDES ──────────────────────────────────────────────────────────────
// Mutations: 'normal', 'runner' (fast/fragile), 'brute' (slow/tanky)
const MUTATIONS={
  normal:{hpMul:1,   spdMul:1,   sizeMul:1,   countMul:1,   color:'#3a6b2a',headColor:'#6fae4a',label:''},
  runner:{hpMul:.4,  spdMul:2.2, sizeMul:.7,  countMul:.7,  color:'#7a5a1a',headColor:'#e8b84a',label:'RUNNER'},
  brute :{hpMul:3.0, spdMul:.55, sizeMul:1.5, countMul:.6,  color:'#3a1a1a',headColor:'#a02828',label:'BRUTE'},
  alpha        :{hpMul:30,  spdMul:.55, sizeMul:1,   countMul:1, color:'#1a0606',headColor:'#7a0a0a',label:'ALPHA'},
  alphaSummoner:{hpMul:12,  spdMul:.4,  sizeMul:1,   countMul:1, color:'#2a0a1a',headColor:'#a0408a',label:'SUMMONER',summon:true,dmgMul:1.0},
  alphaRunner  :{hpMul:10,  spdMul:2.6, sizeMul:.85, countMul:1, color:'#1a1a06',headColor:'#d8c84a',label:'RUSHER'},
  bomber:{hpMul:.6, spdMul:1, sizeMul:.95, countMul:.8, color:'#3a2a08',headColor:'#d08020',label:'BOMBER',explode:{radius:55,dmg:80}},
};
function rollMutation(){
  if(worldDay<15)return 'normal'; // mutations only start after day 15
  const r=Math.random();
  if(r<.18)return 'runner';
  if(r<.30)return 'brute';
  if(worldDay>=30&&r<.42)return 'bomber';
  return 'normal';
}
function makeHorde(x,y,sz,target,mutation){
  const mut=MUTATIONS[mutation]||MUTATIONS.normal;
  const hp=(40+sz*30)*mut.hpMul; // halved
  // Hordes now render as a single zombie — keep `members` empty (legacy code paths tolerate it).
  hordes.push({
    x,y,target,speed:(.16+Math.random()*.08)*mut.spdMul,size:sz,hp,maxHp:hp,
    arrived:false,age:0,members:[],mutation:mutation||'normal'
  });
  if(target&&target.status==='safe')target.status='warned';
}
function pickHordeTarget(fromX,fromY){
  // Any city that isn't already saved/sealed/scorched/pandemic is a valid target.
  // (Previously this required 'safe', which exhausted quickly once cities were warned.)
  const valid=c=>CITY_DEF[c.id]&&(c.status==='safe'||c.status==='saved'||c.status==='warned'||c.status==='attacked'||c.status==='fallen');
  let targets=WORLD_CITIES.filter(valid);
  if(!targets.length)return null;
  targets.sort((a,b)=>Math.hypot(a.x-fromX,a.y-fromY)-Math.hypot(b.x-fromX,b.y-fromY));
  return targets[Math.floor(Math.random()*Math.min(3,targets.length))];
}
function spawnHorde(){
  // Only fully-fallen cities spawn fresh hordes. "Attacked" cities are still defending,
  // so they don't yet pour out zombies — even though they count as lost for nuke gating.
  const origins=WORLD_CITIES.filter(c=>c.status==='fallen');
  if(!origins.length)return;
  const origin=origins[Math.floor(Math.random()*origins.length)];
  const target=pickHordeTarget(origin.x,origin.y);
  if(!target)return;
  // Spawn a swarm: 2–4 hordes at once near the origin, each pointed at a nearby city
  const swarm=2+Math.floor(Math.random()*3);
  for(let i=0;i<swarm;i++){
    const sx=origin.x+(Math.random()-.5)*70;
    const sy=origin.y+(Math.random()-.5)*70;
    const tgt=pickHordeTarget(sx,sy)||target;
    const sz=2+Math.floor(Math.random()*3); // 2–4
    makeHorde(sx,sy,sz,tgt,rollMutation());
  }
}

function updateHordes(){
  hordes.forEach(h=>{
    h.age++;
    // Summoner Alpha: continuously spawns small "meat shield" hordes in front of itself
    // (between itself and its target). Fires every ~2.5s while alive.
    if(h.mutation==='alphaSummoner'&&h.hp>0&&h.target){
      h.summonTimer=(h.summonTimer||0)-1;
      if(h.summonTimer<=0){
        const dx=h.target.x-h.x,dy=h.target.y-h.y,d=Math.hypot(dx,dy)||1;
        const fx=h.x+dx/d*40,fy=h.y+dy/d*40; // ~40px in front
        makeHorde(fx,fy,1,h.target,'normal');
        h.summonTimer=150;
      }
    }
    // Barbed wire: slow + bleed hordes inside any wire radius.
    const wireDef=WORLD_BUILDS.find(b=>b.id==='wire');
    const cpDef=WORLD_BUILDS.find(b=>b.id==='checkpoint');
    let slowFactor=1;
    for(const w of worldStructures){
      if(w.type==='wire'){
        if(Math.hypot(h.x-w.x,h.y-w.y)<wireDef.radius){
          slowFactor=Math.min(slowFactor,wireDef.slow);
          h.hp-=wireDef.dmg;
        }
      }else if(w.type==='checkpoint'){
        const dx=h.x-w.x,dy=h.y-w.y,d=Math.hypot(dx,dy);
        if(d<cpDef.radius){
          slowFactor=Math.min(slowFactor,cpDef.slow);
          h.hp-=cpDef.dmg;
          // If horde tries to walk through the gate, push it sideways to reroute
          if(d<cpDef.blockR){
            const nd=d||1;
            const px=dx/nd,py=dy/nd;
            h.x+=px*.6;h.y+=py*.6;
          }
        }
      }
    }
    // Snowy areas: slow + slowly damage zombies. Mountains: slow.
    if(inSnowyAt(h.x,h.y)){slowFactor=Math.min(slowFactor,.5);h.hp-=.05}
    if(inMountainAt(h.x,h.y))slowFactor=Math.min(slowFactor,.5);
    h._slow=slowFactor;
    // Find the nearest mobile division (or destructible Forward Base) within engagement range.
    // Arrived hordes use a wider sense range — they chew anything that comes close to the city.
    const senseR=h.arrived?70:55;
    let block=null,bd=Infinity;
    for(const s of worldStructures){
      const def=WORLD_BUILDS.find(b=>b.id===s.type);
      if(!def)continue;
      const attackable=def.mobile||s.type==='fob';
      if(!attackable||(s.hp||0)<=0)continue;
      if(fogBlocks(h.x,h.y,s.x,s.y))continue;
      const ddx=s.x-h.x,ddy=s.y-h.y,dd=Math.hypot(ddx,ddy);
      if(dd<senseR&&dd<bd){bd=dd;block=s}
    }
    if(block){
      const bdx=block.x-h.x,bdy=block.y-h.y,bdd=Math.hypot(bdx,bdy)||1;
      if(bdd<14){
        // In melee: chew the division. Bigger hordes bite harder.
        block.hp-=.18*(h.size||1);
      }else if(!h.arrived){
        // Travelers divert toward the threat in their path.
        h.x+=bdx/bdd*h.speed*h._slow;h.y+=bdy/bdd*h.speed*h._slow;
      }else{
        // Arrived hordes lurch out from the city to swat the closest division.
        h.x+=bdx/bdd*h.speed*.6*h._slow;h.y+=bdy/bdd*h.speed*.6*h._slow;
      }
      return;
    }
    if(h.arrived)return;
    const dx=h.target.x-h.x,dy=h.target.y-h.y,d=Math.hypot(dx,dy);
    if(d<8){
      h.arrived=true;
      if(h.target.status!=='fallen'&&h.target.status!=='saved')h.target.status='attacked';
    }else{
      h.x+=dx/d*h.speed*h._slow;h.y+=dy/d*h.speed*h._slow;
    }
  });
  hordes=hordes.filter(h=>{
    if(h.hp<=0){
      // Bomber zombies detonate on death — AOE damages player units/structures + nearby zombies
      if(h.mutation==='bomber'){
        const exp=(MUTATIONS.bomber&&MUTATIONS.bomber.explode)||{radius:55,dmg:80};
        bomberBlasts.push({x:h.x,y:h.y,radius:exp.radius,dmg:exp.dmg,t:0,dur:24});
        for(const s of worldStructures){
          const sd=WORLD_BUILDS.find(b=>b.id===s.type);
          if(!sd||(s.hp||0)<=0)continue;
          if(!sd.mobile&&!sd.hp)continue;
          if(Math.hypot(s.x-h.x,s.y-h.y)<exp.radius)s.hp-=exp.dmg;
        }
        for(const o of hordes){
          if(o===h||o.hp<=0)continue;
          if(Math.hypot(o.x-h.x,o.y-h.y)<exp.radius)o.hp-=exp.dmg*.5;
        }
      }
      return false;
    }
    if(!h.arrived)return true;
    // Arrived hordes stick at the city forever once they've taken it.
    // They only despawn when the city is reclaimed (saved), scorched/sealed (eradicated), or deserted (zone cleared).
    const t=h.target;
    if(!t)return h.age<400;
    if(t.status==='saved'||t.status==='scorched'||t.status==='sealed'||t.status==='deserted')return false;
    return true;
  });
  // If a city was under siege (attacked/fallen) and all hordes targeting it
  // are wiped out before it turns into a pandemic zone, it's saved — and can
  // be attacked again later.
  WORLD_CITIES.forEach(c=>{
    if(c.status!=='attacked'&&c.status!=='warned'&&c.status!=='fallen')return;
    if(defenses[c.id]&&!defenses[c.id].result)return; // active player defense
    const stillTargeted=hordes.some(h=>h.target===c&&h.hp>0);
    if(stillTargeted)return;
    c.status='safe';
    c.attackedTimer=0;
    c.fallTimer=0;
    flash(`✓ ${c.name} cleared — hordes destroyed`,'#4f4',1400);
  });
}

// ── WORLD STRUCTURES (cannons, FOBs, divisions) ────────────────────────
// Spawn a glowing tracer projectile from a shooter (structure) toward a target.
// Skipped for melee/beam weapons that already have their own visuals.
function spawnTracer(s,target,def){
  if(!target)return;
  const skip={'baguette-div':1,'laser-div':1,'pyro':1};
  if(skip[s.type])return;
  // RPG-style launchers get a red rocket; everything else fires a yellow-orange tracer.
  const isRocket=s.type==='rpg-div'||s.type==='bomber'||s.type==='arty-truck';
  const dx=target.x-s.x,dy=target.y-s.y,d=Math.hypot(dx,dy)||1;
  // tip of the gun barrel — offset along the firing axis so the tracer leaves the muzzle, not the body.
  const off=(def&&def.range)?Math.min(14,d*.25):8;
  const sx=s.x+dx/d*off,sy=s.y+dy/d*off;
  // travel time: faster for short distances, capped frames so it always feels snappy.
  const spd=isRocket?5.5:9;
  const dur=Math.max(3,Math.min(28,d/spd));
  worldProjectiles.push({
    x:sx,y:sy,sx,sy,tx:target.x,ty:target.y,t:0,dur,
    kind:isRocket?'rocket':'tracer'
  });
}
function updateWorldProjectiles(){
  for(let i=worldProjectiles.length-1;i>=0;i--){
    const p=worldProjectiles[i];
    p.t++;
    const k=Math.min(1,p.t/p.dur);
    p.x=p.sx+(p.tx-p.sx)*k;
    p.y=p.sy+(p.ty-p.sy)*k;
    if(p.t>=p.dur){
      // Rocket-kind projectiles (RPG, bomber) burst into a small explosion on arrival — visual only,
      // damage was already applied at fire time. Reuses the bomberBlasts vfx.
      if(p.kind==='rocket'){
        bomberBlasts.push({x:p.tx,y:p.ty,radius:34,dmg:0,t:0,dur:18});
      }
      worldProjectiles.splice(i,1);
    }
  }
}
// ── HORDE SPATIAL GRID ─────────────────────────────────────────────────
// Bucket all live hordes into a grid so range queries become O(near) instead of O(all).
// Rebuilt once per structure-update tick. Dead hordes are skipped at bin time.
const HG_CELL=100;
let _hordeGrid=null;
function rebuildHordeGrid(){
  _hordeGrid=new Map();
  for(let i=0;i<hordes.length;i++){
    const h=hordes[i];
    if(h.hp<=0)continue;
    const cx=Math.floor(h.x/HG_CELL), cy=Math.floor(h.y/HG_CELL);
    const k=cx*100000+cy;
    let arr=_hordeGrid.get(k);
    if(!arr){arr=[];_hordeGrid.set(k,arr)}
    arr.push(h);
  }
}
// Iterate hordes within `radius` of (x,y). Calls fn(h, dist) for each match.
// Skips dead hordes (h.hp<=0) defensively in case of mid-frame deaths.
function forHordesInRadius(x,y,radius,fn){
  if(!_hordeGrid)return;
  const r2=radius*radius;
  const minCx=Math.floor((x-radius)/HG_CELL), maxCx=Math.floor((x+radius)/HG_CELL);
  const minCy=Math.floor((y-radius)/HG_CELL), maxCy=Math.floor((y+radius)/HG_CELL);
  for(let cx=minCx;cx<=maxCx;cx++){
    for(let cy=minCy;cy<=maxCy;cy++){
      const arr=_hordeGrid.get(cx*100000+cy);
      if(!arr)continue;
      for(let i=0;i<arr.length;i++){
        const h=arr[i];
        if(h.hp<=0)continue;
        const dx=h.x-x, dy=h.y-y, d2=dx*dx+dy*dy;
        if(d2<r2)fn(h,Math.sqrt(d2));
      }
    }
  }
}
function updateWorldStructures(){
  // Rebuild horde grid once per tick — used by all per-structure range queries below.
  rebuildHordeGrid();
  // Defensive scrub: clear cached target refs that point at dead hordes.
  // Prevents stale references from causing tracers, muzzle flashes, or bite damage
  // to be applied to corpses (or worse, hordes already filtered out of the array next frame).
  for(const s of worldStructures){
    if(s.target&&typeof s.target.hp==='number'&&s.target.hp<=0)s.target=null;
    if(s._mgaTarget&&(s._mgaTarget.hp||0)<=0)s._mgaTarget=null;
    if(s._mgbTarget&&(s._mgbTarget.hp||0)<=0)s._mgbTarget=null;
    if(s._missileTargets){
      for(let i=0;i<s._missileTargets.length;i++){
        const t=s._missileTargets[i];
        if(t&&(t.hp||0)<=0)s._missileTargets[i]=null;
      }
    }
  }
  // Hordes lured by an expired decoy can still hold a stale _origTarget.
  // Cities don't have hp, so check the city-status sentinels instead.
  for(const h of hordes){
    if(!h._origTarget)continue;
    const ot=h._origTarget;
    if(ot.status==='saved'||ot.status==='scorched'||ot.status==='sealed'||ot.status==='deserted')h._origTarget=null;
  }
  worldStructures.forEach(s=>{
    const def=WORLD_BUILDS.find(b=>b.id===s.type);if(!def)return;
    if(def.mobile){
      // Toxic gas zones: any troop inside is converted to harmless toxic gas.
      if(inToxicGasAt(s.x,s.y)&&!s._toxicGas){
        s._toxicGas=true;
        s.hp=0;
        toxicGasPuffs.push({x:s.x,y:s.y,t:0,dur:60});
        return;
      }
      // Fog/forest blinds the unit's targeting (mutual blindness; player still sees everything).
      // Search radius generous enough to allow the unit to approach hordes outside firing range.
      let target=null,minD=Infinity;
      const searchR=Math.max(def.range||0, 500);
      forHordesInRadius(s.x,s.y,searchR,(h,d)=>{
        if(fogBlocks(s.x,s.y,h.x,h.y))return;
        // Naval cannons & long-barrel guns can't depress low enough to hit point-blank targets.
        if(def.minRange&&d<def.minRange)return;
        if(d<minD){minD=d;target=h}
      });
      // Transport: when a horde is in trigger range, drop its payload (rifle divs + extras) ONCE.
      // Transport itself sticks around with light weapons after deploying.
      if(def.splitInto&&!s._deployed&&target&&minD<def.splitTrigger&&worldPrepTimer<=0){
        const childDef=WORLD_BUILDS.find(b=>b.id===def.splitInto);
        if(childDef){
          // Total payload = main split + any extras, distributed around the transport in a ring.
          const extras=def.splitExtras||[];
          let total=def.splitCount;
          extras.forEach(x=>total+=x.count);
          let idx=0;
          for(let i=0;i<def.splitCount;i++,idx++){
            const a=(idx/total)*Math.PI*2;
            worldStructures.push({type:def.splitInto,x:s.x+Math.cos(a)*8,y:s.y+Math.sin(a)*8,cooldown:0,hp:childDef.hp,maxHp:childDef.hp,state:'idle'});
          }
          for(const ex of extras){
            const exDef=WORLD_BUILDS.find(b=>b.id===ex.type);
            if(!exDef)continue;
            for(let j=0;j<ex.count;j++,idx++){
              const a=(idx/total)*Math.PI*2;
              worldStructures.push({type:ex.type,x:s.x+Math.cos(a)*8,y:s.y+Math.sin(a)*8,cooldown:0,hp:exDef.hp,maxHp:exDef.hp,state:'idle'});
            }
          }
          s._deployed=true;
          flash(`🚚 Transport deployed — 2 Rifle Divs + 1 MG Div in field`,'#9b6',1400);
          // fall through so the transport itself can still target/fire this frame
        }
      }
      // All mobile units seek out pandemic zones when no horde threat is closer.
      // Pandemic zones are the fog source itself, so they're targetable from outside fog.
      // A unit standing inside pandemic fog can't shoot at all (sourceInPF blocks targeting).
      const sourceInPF=inPandemicFogAt(s.x,s.y);
      let zoneTarget=null;
      let zd=Infinity;
      for(const z of PANDEMIC_ZONES){
        if((z.hp||0)<=0)continue;
        if(!def.air&&!isLand(z.x,z.y))continue;
        if(sourceInPF&&sourceInPF!==z)continue;
        const d=Math.hypot(z.x-s.x,z.y-s.y);
        if(d<zd){zd=d;zoneTarget=z}
      }
      if(sourceInPF){target=null;minD=Infinity}
      // Prefer the closer of (nearest horde) vs (nearest zone). Hordes win ties so units defend first.
      if(zoneTarget&&(!target||zd<minD))target=zoneTarget;
      s.target=target;
      s.cooldown=(s.cooldown||0)-1;
      s.flash=Math.max(0,(s.flash||0)-1);
      if(target){
        const dx=target.x-s.x,dy=target.y-s.y,d=Math.hypot(dx,dy)||1;
        let speedMul=1;
        if(inForestAt(s.x,s.y))speedMul=.5;
        if(inSnowyAt(s.x,s.y))speedMul=Math.min(speedMul,.5);
        if(inMountainAt(s.x,s.y))speedMul=Math.min(speedMul,.5);
        const moveSpd=def.spd*speedMul;
        // Naval ships move on water only; air anywhere; everything else on land.
        // Reject moves that would enter a toxic gas zone — troops dissolve there.
        // Static units (e.g. UPKR garrison MGs) never move but still fire.
        const tryMove=(nx,ny)=>{if(worldPrepTimer>0)return false;if(s._static)return false;if(inToxicGasAt(nx,ny))return false;if(def.air||(def.naval?!isLand(nx,ny):isLand(nx,ny))){s.x=nx;s.y=ny;return true}return false};
        // Pilot override: a manually-driven naval ship moves toward s.dest and ignores AI movement.
        // Turrets keep auto-firing at any in-range target.
        const piloted=def.naval&&s===pilotedShip;
        if(!s._player){
          if(piloted&&s.dest){
            const ddx=s.dest.x-s.x,ddy=s.dest.y-s.y,dd=Math.hypot(ddx,ddy)||1;
            if(dd>moveSpd*1.2)tryMove(s.x+ddx/dd*moveSpd,s.y+ddy/dd*moveSpd);
            s.state='pilot';
          }else if(d<def.retreat){
            s.state='retreat';
            tryMove(s.x-dx/d*moveSpd,s.y-dy/d*moveSpd);
          }else if(d<def.range){
            s.state='engage';
          }else{
            s.state='approach';
            if(!tryMove(s.x+dx/d*moveSpd,s.y+dy/d*moveSpd)){
              // Try sliding along axes to follow coastline
              if(!tryMove(s.x+dx/d*moveSpd,s.y))tryMove(s.x,s.y+dy/d*moveSpd);
            }
          }
        }else{
          // Player division: no AI movement (WASD only in updateWorldMap). Keep state for consistency.
          if(d<def.retreat)s.state='retreat';
          else if(d<def.range)s.state='engage';
          else s.state='approach';
        }
        // Firing logic — independent of pilot/auto state. Fires whenever target is in range
        // (and outside minRange for ships with naval cannons). Player division fires on E only (after cooldown tick).
        if(!s._player&&d<def.range&&d>=(def.minRange||0)&&s.cooldown<=0&&worldPrepTimer<=0&&def.dmg>0){
          if(def.aoe){
            forHordesInRadius(target.x,target.y,def.aoe,h2=>{ h2.hp-=def.dmg; });
            for(const z of PANDEMIC_ZONES){
              if((z.hp||0)<=0)continue;
              if(Math.hypot(z.x-target.x,z.y-target.y)<def.aoe)z.hp-=def.dmg;
            }
          }else{
            target.hp-=def.dmg;
          }
          s.cooldown=shotCooldown(def);s.flash=8;
          spawnTracer(s,target,def);
        }
        if(d<22&&!def.air&&!def.naval&&target!==zoneTarget){
          // Cover aura: any friendly Fort within its coverRadius reduces incoming bite damage.
          let coverMul=1;
          for(const f of worldStructures){
            if(f.type!=='fort'||(f.hp||0)<=0)continue;
            const fd=WORLD_BUILDS.find(b=>b.id==='fort');
            if(Math.hypot(f.x-s.x,f.y-s.y)<(fd.coverRadius||0))coverMul=Math.min(coverMul,fd.coverMul);
          }
          s.hp-=.15*(target.size||1)*coverMul;
        }
      }else{s.state='idle'}
      // A254 ULTIMATE MECH — two independent MGs + 5 missile bays, each weapon picks its own target.
      // Skips the standard fire path because def.dmg=0; firing is fully custom here.
      if(def.a254&&worldPrepTimer<=0){
        // Build a sorted list of in-range, visible hordes
        const cand=[];
        forHordesInRadius(s.x,s.y,def.range,(h,dd)=>{
          if(fogBlocks(s.x,s.y,h.x,h.y))return;
          cand.push({h,d:dd});
        });
        cand.sort((a,b)=>a.d-b.d);
        // ── Two independent MGs (MG-A & MG-B) ──
        // Each picks its own target from the two nearest distinct hordes; falls back to the same horde if only one is visible.
        const MG_RATE=5, MG_DMG=14, MG_RANGE=def.range*0.7;
        const mgPool=cand.filter(c=>c.d<MG_RANGE);
        const mgA=mgPool[0]?mgPool[0].h:null;
        const mgB=mgPool[1]?mgPool[1].h:(mgPool[0]?mgPool[0].h:null);
        s._mgaTarget=mgA; s._mgbTarget=mgB;
        s._mgaCool=(s._mgaCool||0)-1;
        s._mgbCool=(s._mgbCool||0)-1;
        s._mgaFlash=Math.max(0,(s._mgaFlash||0)-1);
        s._mgbFlash=Math.max(0,(s._mgbFlash||0)-1);
        if(mgA&&s._mgaCool<=0){
          mgA.hp-=MG_DMG; s._mgaCool=MG_RATE; s._mgaFlash=8;
          spawnTracer(s,mgA,{range:MG_RANGE});
        }
        if(mgB&&s._mgbCool<=0){
          mgB.hp-=MG_DMG; s._mgbCool=MG_RATE; s._mgbFlash=8;
          spawnTracer(s,mgB,{range:MG_RANGE});
        }
        // ── Five missile bays — each cools independently every 3s, picks a distinct target ──
        const MISSILE_RATE=180, MISSILE_DMG=220, MISSILE_AOE=55;
        if(!s._missileCool){ s._missileCool=[0,36,72,108,144]; s._missileTargets=[null,null,null,null,null]; }
        s._missileFlash=Math.max(0,(s._missileFlash||0)-1);
        for(let i=0;i<5;i++){
          s._missileCool[i]--;
          if(s._missileCool[i]<=0 && cand.length>0){
            // Each bay picks a different horde when possible (round-robin by index)
            const tgt=cand[i % cand.length].h;
            s._missileTargets[i]=tgt;
            // AOE damage applied at fire-time (visual rocket flies separately)
            forHordesInRadius(tgt.x,tgt.y,MISSILE_AOE,h2=>{ h2.hp-=MISSILE_DMG; });
            for(const z of PANDEMIC_ZONES){
              if((z.hp||0)<=0)continue;
              if(Math.hypot(z.x-tgt.x,z.y-tgt.y)<MISSILE_AOE)z.hp-=MISSILE_DMG;
            }
            // Visual rocket projectile (kind:'rocket' triggers an impact bomberBlast)
            const dxm=tgt.x-s.x, dym=tgt.y-s.y, dm=Math.hypot(dxm,dym)||1;
            const dur=Math.max(8,Math.min(36,dm/4.5));
            // Slight per-bay launch offset so missiles look like they leave individual tubes, not the centre
            const baySpread=(i-2)*4;
            const perpX=-dym/dm*baySpread, perpY=dxm/dm*baySpread;
            worldProjectiles.push({x:s.x+perpX,y:s.y+perpY,sx:s.x+perpX,sy:s.y+perpY,tx:tgt.x,ty:tgt.y,t:0,dur,kind:'rocket'});
            s._missileCool[i]=MISSILE_RATE;
            s._missileFlash=10;
          }
        }
        // Drive shared s.flash so generic chrome (HP bar etc) sees activity
        s.flash=Math.max(s.flash||0, s._mgaFlash||0, s._mgbFlash||0, s._missileFlash||0);
      }
      // Battleship secondary: rapid MG fires at close hordes alongside the main cannons.
      if(s.type==='battleship'&&worldPrepTimer<=0){
        s.mgCooldown=(s.mgCooldown||0)-1;
        if(s.mgCooldown<=0){
          let mgT=null,mgD=Infinity;
          for(const h of hordes){
            if(h.hp<=0)continue;
            const d2=Math.hypot(h.x-s.x,h.y-s.y);
            if(d2<def.mgRange&&d2<mgD){mgD=d2;mgT=h}
          }
          if(mgT){
            mgT.hp-=def.mgDmg;
            s.mgCooldown=def.mgRate;
            spawnTracer(s,mgT,{range:def.mgRange});
          }
        }
      }
      // Carrier / Aircraft Carrier auto-deploy when within deployTrigger of a shore tile.
      if(def.naval&&def.deployUnit&&!s._deployed&&worldPrepTimer<=0){
        let shoreX=null,shoreY=null,shoreD=Infinity;
        for(let r=8;r<=def.deployTrigger+12;r+=8){
          for(let ang=0;ang<Math.PI*2;ang+=Math.PI/12){
            const px=s.x+Math.cos(ang)*r,py=s.y+Math.sin(ang)*r;
            if(isLand(px,py)){if(r<shoreD){shoreD=r;shoreX=px;shoreY=py}break}
          }
          if(shoreX!==null)break;
        }
        if(shoreX!==null&&shoreD<=def.deployTrigger){
          s._deployed=true;
          const childDef=WORLD_BUILDS.find(b=>b.id===def.deployUnit);
          if(childDef){
            const extras=def.deployExtras||[];
            let total=def.deployCount;
            extras.forEach(x=>total+=x.count);
            const baseHeading=Math.atan2(shoreY-s.y,shoreX-s.x);
            const placeAt=(type,childD,idx)=>{
              const a=(idx-(total-1)/2)*.45;
              const baseAng=baseHeading+a;
              let px=shoreX+Math.cos(baseAng)*6,py=shoreY+Math.sin(baseAng)*6;
              if(!childD.air&&!isLand(px,py)){
                for(let r=4;r<32;r+=4){
                  const tx=shoreX+Math.cos(baseAng)*r,ty=shoreY+Math.sin(baseAng)*r;
                  if(isLand(tx,ty)){px=tx;py=ty;break}
                }
              }
              worldStructures.push({type,x:px,y:py,cooldown:0,hp:childD.hp,maxHp:childD.hp,state:'idle'});
            };
            let idx=0;
            for(let i=0;i<def.deployCount;i++,idx++)placeAt(def.deployUnit,childDef,idx);
            for(const ex of extras){
              const exDef=WORLD_BUILDS.find(b=>b.id===ex.type);
              if(!exDef)continue;
              for(let j=0;j<ex.count;j++,idx++)placeAt(ex.type,exDef,idx);
            }
            const summary=extras.length?`${def.deployCount}× ${childDef.name} + ${extras.map(e=>`${e.count}× ${WORLD_BUILDS.find(b=>b.id===e.type)?.name||e.type}`).join(' + ')}`:`${def.deployCount}× ${childDef.name}`;
            flash(`🚢 ${def.name} → ${summary} ashore`,'#9bf',2400);
            // Carrier sticks around after deploy — it has its own light naval weapon.
          }
        }
      }
    }else if(s.type==='cannon'){
      s.cooldown=(s.cooldown||0)-1;
      let target=null,minD=Infinity;
      // Zombies inside the minRange deadzone cannot be hit — gun arcs lob too far for close targets.
      const minR=def.minRange||0;
      forHordesInRadius(s.x,s.y,def.range,(h,d)=>{
        if(d<=minR)return;
        if(fogBlocks(s.x,s.y,h.x,h.y))return;
        if(d<minD){minD=d;target=h}
      });
      s.target=target;
      if(target&&s.cooldown<=0&&worldPrepTimer<=0){target.hp-=def.dmg;s.cooldown=shotCooldown(def);s.flash=14;spawnTracer(s,target,def)}
      s.flash=Math.max(0,(s.flash||0)-1);
    }else if(s.type==='decoy'){
      // Decoy beacon — redirect nearby hordes toward the beacon. Stores original target
      // on each horde so it can be restored when the decoy expires.
      if(s.life===undefined) s.life=def.duration;
      s.life--;
      forHordesInRadius(s.x,s.y,def.range,h=>{
        if(!h._origTarget) h._origTarget=h.target;
        h.target={x:s.x,y:s.y,status:'safe'};
        h.arrived=false;
      });
      if(s.life<=0) s.hp=0;
    }else if(s.type==='mine'){
      // Mine arms after a short delay, then detonates on first zombie inside trigger radius.
      // Detonation: AOE damage to hordes and player units (friendly fire), single-use.
      s.armed=(s.armed||0)+1;
      if(s.armed>=(def.armTime||30)&&worldPrepTimer<=0){
        let trigger=null;
        forHordesInRadius(s.x,s.y,def.range,h=>{ if(!trigger)trigger=h; });
        if(trigger){
          const aoe=def.aoe||45;
          forHordesInRadius(s.x,s.y,aoe,h=>{ h.hp-=def.dmg; });
          for(const o of worldStructures){
            if(o===s)continue;
            const od=WORLD_BUILDS.find(b=>b.id===o.type);
            if(!od||(o.hp||0)<=0)continue;
            if(!od.mobile&&!od.hp)continue;
            if(Math.hypot(o.x-s.x,o.y-s.y)<aoe)o.hp-=def.dmg*.6;
          }
          bomberBlasts.push({x:s.x,y:s.y,radius:aoe,dmg:def.dmg,t:0,dur:24});
          s.hp=0; // mark for removal
        }
      }
    }else if(s.type==='fort'){
      // Fort = static building with internal cannon. Cover aura is applied separately
      // (see bite-damage attenuation further below) so any friendly mobile div standing
      // inside coverRadius takes reduced bite damage.
      s.cooldown=(s.cooldown||0)-1;
      let target=null,minD=Infinity;
      forHordesInRadius(s.x,s.y,def.range,(h,d)=>{
        if(fogBlocks(s.x,s.y,h.x,h.y))return;
        if(d<minD){minD=d;target=h}
      });
      s.target=target;
      if(target&&s.cooldown<=0&&worldPrepTimer<=0){target.hp-=def.dmg;s.cooldown=shotCooldown(def);s.flash=12;spawnTracer(s,target,def)}
      s.flash=Math.max(0,(s.flash||0)-1);
    }
  });
  // Field hospitals: heal nearby divisions (passive aura)
  const hospitalDef=WORLD_BUILDS.find(b=>b.id==='hospital');
  worldStructures.forEach(h=>{
    if(h.type!=='hospital')return;
    worldStructures.forEach(s=>{
      const def=WORLD_BUILDS.find(b=>b.id===s.type);
      if(!def||!def.mobile||(s.hp||0)<=0||s.hp>=def.hp)return;
      if(Math.hypot(s.x-h.x,s.y-h.y)<hospitalDef.radius){
        s.hp=Math.min(def.hp,s.hp+hospitalDef.heal);
      }
    });
  });
  worldStructures=worldStructures.filter(s=>{
    const def=WORLD_BUILDS.find(b=>b.id===s.type);
    if(!def)return true;
    // Forward Bases are destructible too — remove with a flash, no reanimation.
    if(s.type==='fob'){
      if((s.hp||0)>0)return true;
      flash(`✗ Forward Base destroyed`,'#f44',2000);
      return false;
    }
    // Artillery cannons can be wrecked (e.g. by airstrike friendly fire / nukes).
    if(s.type==='cannon'){
      if((s.hp||0)>0)return true;
      flash(`✗ Artillery cannon wrecked`,'#f66',1800);
      return false;
    }
    // Mines are single-use — remove silently once triggered (blast vfx already pushed).
    if(s.type==='mine'){
      return (s.hp||0)>0;
    }
    // Decoy beacons expire after `duration` ticks — restore each lured horde's original target.
    if(s.type==='decoy'){
      if((s.hp||0)>0)return true;
      for(const h of hordes){
        if(h._origTarget && h.target && Math.abs(h.target.x-s.x)<.5 && Math.abs(h.target.y-s.y)<.5){
          h.target=h._origTarget;
          h._origTarget=null;
          h.arrived=false;
        }
      }
      flash(`📡 Decoy beacon expired`,'#9cf',1400);
      return false;
    }
    // Forts are destructible — collapse with a flash, no reanimation.
    if(s.type==='fort'){
      if((s.hp||0)>0)return true;
      flash(`✗ Fort fell`,'#f66',2000);
      return false;
    }
    if(!def.mobile)return true;
    if(s.hp>0)return true;
    // Transport that consumed itself by splitting — silent despawn.
    if(s._consumed){if(pilotedShip===s)pilotedShip=null;return false}
    // Naval ships sink at sea — no zombification, no horde spawn.
    if(def.naval){
      if(pilotedShip===s)pilotedShip=null;
      if(viewedDefId==null)flash(`⛴ ${def.name} sunk`,'#9cf',2000);
      return false;
    }
    // Mechs can't be infected — they leave a wreck and vanish without reanimating.
    if(def.noInfect){
      if(viewedDefId==null)flash(`✚ ${def.name} destroyed — wreck recovered`,'#9cf',1800);
      return false;
    }
    // D-303 dust — vaporized by the super-missile, NEVER reanimates.
    if(s._dusted){
      if(viewedDefId==null)flash(`☣ ${def.name} dusted by D-303`,'#9f6',1600);
      return false;
    }
    // Division killed → may turn into a horde of zombified troops.
    // A nearby field hospital halves the reanimation chance (50%).
    const inHospital=worldStructures.some(h2=>h2.type==='hospital'&&Math.hypot(h2.x-s.x,h2.y-s.y)<hospitalDef.radius);
    const reanimate=inHospital?Math.random()<.5:true;
    if(reanimate){
      const sz=def.id==='tank-div'?3:def.id==='bomber'?3:def.id==='apc-div'?3:def.id==='gatling-div'?2:def.id==='rpg-div'?2:def.id==='mg-div'?2:def.id==='ak-plane'?2:def.id==='pyro'?2:def.id==='sniper-div'?1:def.id==='fav-div'?1:def.id==='ar-div'?2:def.id==='transport'?3:def.id==='arty-truck'?3:def.id==='laser-div'?2:def.id==='baguette-div'?2:2;
      const tgt=pickHordeTarget(s.x,s.y);
      if(tgt)makeHorde(s.x,s.y,sz,tgt);
      if(viewedDefId==null)flash(`☠ ${def.name} overrun — turned!`,'#f44',1800);
    }else{
      if(viewedDefId==null)flash(`✚ ${def.name} KIA — body recovered`,'#9cf',1800);
    }
    return false;
  });
}

// ── ATTACKED-CITY FALL TIMER ─────────────────────────────────────────────
const CITY_FALL_TIME=1500; // ~25s
const FALLEN_DECAY=1800;   // ~30s before a fallen city becomes a pandemic zone
function cityFell(id,cause){
  const c=WORLD_CITIES.find(x=>x.id===id);if(!c||c.status==='pandemic'||c.status==='scorched'||c.status==='sealed')return;
  c.status='fallen';c.attackedTimer=0;c.fallTimer=FALLEN_DECAY;
  if(defenses[id])delete defenses[id];
  // If the player is currently watching this city's defense, show the choice dialog now.
  if(viewedDefId===id){
    screen='result';
    showFallenChoiceDialog(id);
  }else{
    flash(`✗ ${c.name} fallen — choose response from map`,'#f44',2800);
  }
}
function updateAttackedCities(){
  WORLD_CITIES.forEach(c=>{
    // Evacuation tick
    if(c.evacuating&&!c.evacuated){
      c.evacTimer=(c.evacTimer||0)-1;
      if(c.evacTimer<=0){
        c.evacuating=false;c.evacuated=true;
        flash(`✓ ${c.name} civilians evacuated`,'#9cf',2400);
      }
    }
    if(c.status==='attacked'){
      const beingDefended=defenses[c.id]&&!defenses[c.id].result;
      if(!beingDefended&&!worldPrepTimer){
        c.attackedTimer=(c.attackedTimer||0)+1;
        if(c.attackedTimer>=CITY_FALL_TIME){cityFell(c.id,'undefended')}
      }
    }else if(c.status==='fallen'){
      // Tick toward pandemic. Pause if troops are currently fighting to retake (defense active).
      const beingDefended=defenses[c.id]&&!defenses[c.id].result;
      if(!beingDefended){
        c.fallTimer=(c.fallTimer||FALLEN_DECAY)-1;
        if(c.fallTimer<=0){
          if(c.evacuated){
            c.status='deserted';c.fallTimer=0;
            flash(`☐ ${c.name} abandoned — no civilians to infect`,'#9cf',3200);
          }else{
            c.status='pandemic';
            PANDEMIC_ZONES.push({x:c.x,y:c.y,name:c.name+' Outbreak',spawnTimer:60,pulse:0,hp:COUNTRY_ZONE_HP,maxHp:COUNTRY_ZONE_HP,cityId:c.id});
            flash(`☣ ${c.name} is now a PANDEMIC ZONE`,'#f44',3200);
          }
        }
      }
    }else if(c.status==='sealed'){
      // Seal is temporary — when it breaks the contained outbreak erupts as a pandemic zone.
      c.sealTimer=(c.sealTimer||0)-1;
      if(c.sealTimer<=0){
        c.status='pandemic';c.sealTimer=0;
        PANDEMIC_ZONES.push({x:c.x,y:c.y,name:c.name+' Outbreak',spawnTimer:60,pulse:0,hp:COUNTRY_ZONE_HP,maxHp:COUNTRY_ZONE_HP,cityId:c.id});
        flash(`☣ Seal broke — ${c.name} is now a PANDEMIC ZONE`,'#f44',3200);
      }
    }else{c.attackedTimer=0}
  });
}

function showFallenChoiceDialog(id){
  const wc=WORLD_CITIES.find(c=>c.id===id),def=CITY_DEF[id];
  if(!wc||!def)return;
  const sec=Math.ceil((wc.fallTimer||FALLEN_DECAY)/60);
  showDialog('CITY LOST',`${def.name}, ${def.country}`,
    `${def.name} has fallen.\nWithout action it becomes a pandemic zone in ~${sec}s.\n\nChoose your response:`,
    [
      {label:'☢ SCORCHED EARTH ($400)',danger:true,onClick:()=>chooseScorched(id)},
      {label:'🚫 SEAL OFF — 20s ($200)',onClick:()=>chooseSeal(id)},
      {label:'DO NOTHING',danger:true,onClick:()=>{hideDialog();if(screen==='result')returnToMap()}}
    ]);
}
function retakeFallen(id){
  const wc=WORLD_CITIES.find(c=>c.id===id);if(!wc)return;
  wc.status='attacked';wc.fallTimer=0;wc.attackedTimer=0;
  hideDialog();enterCity(id);
}
function chooseScorched(id){
  if(worldGold<400){flash('Need $400 world gold','#f66',1500);return}
  worldGold-=400;
  const wc=WORLD_CITIES.find(c=>c.id===id);if(!wc)return;
  wc.status='scorched';wc.fallTimer=0;
  flash(`☢ ${CITY_DEF[id].country} scorched`,'#f80',2400);
  hideDialog();if(screen==='result')returnToMap();
}
const SEAL_TIME=1200; // 20s of containment, then the seal breaks
function chooseSeal(id){
  if(worldGold<200){flash('Need $200 world gold','#f66',1500);return}
  worldGold-=200;
  const wc=WORLD_CITIES.find(c=>c.id===id);if(!wc)return;
  wc.status='sealed';wc.fallTimer=0;wc.sealTimer=SEAL_TIME;
  flash(`🚫 ${CITY_DEF[id].name} sealed off — 20s`,'#fa4',2200);
  hideDialog();if(screen==='result')returnToMap();
}

// ── WORLD UPDATE LOOP ────────────────────────────────────────────────────
function updateWorldMap(){
  worldTimer++;
  if(worldTimer%240===0)worldDay++;
  if(worldPrepTimer>0)worldPrepTimer--;
  // Camera panning: ARROW KEYS only (WASD now controls the player division).
  let kdx=0,kdy=0;
  if(keys['arrowup'])kdy-=1;
  if(keys['arrowdown'])kdy+=1;
  if(keys['arrowleft'])kdx-=1;
  if(keys['arrowright'])kdx+=1;
  if(kdx||kdy){
    const len=Math.hypot(kdx,kdy)||1;
    const panSpd=14/Math.max(.4,wCam.zoom);
    wCam.x=Math.max(0,Math.min(MAP_W,wCam.x+kdx/len*panSpd));
    wCam.y=Math.max(0,Math.min(MAP_H,wCam.y+kdy/len*panSpd));
  }
  // Player division control: WASD moves, E fires.
  const playerS=worldStructures.find(u=>u._player&&(u.hp||0)>0);
  if(playerS){
    const pdef=WORLD_BUILDS.find(b=>b.id===playerS.type);
    // Auto-aim: always face the nearest zombie globally so the weapon points at the threat.
    let nearestH=null,nearestD=Infinity;
    for(const h of hordes){
      if((h.hp||0)<=0)continue;
      const d=Math.hypot(h.x-playerS.x,h.y-playerS.y);
      if(d<nearestD){nearestD=d;nearestH=h}
    }
    if(nearestH)playerS.target=nearestH;
    // Cache the player's home position once. Snap to nearest land tile so respawn lands on terra firma.
    if(playerS._home===undefined){
      let hx,hy;
      if(playerCountry==='upkr'){const f=FACTION_BASES.find(b=>b.name==='UPKR');if(f){hx=f.x;hy=f.y+30}}
      else if(playerCountry==='kamw'){const f=FACTION_BASES.find(b=>b.name==='KAMW');if(f){hx=f.x;hy=f.y-30}}
      else{const c=WORLD_CITIES.find(c=>c.id===playerCountry);if(c){hx=c.x;hy=c.y+12}}
      // Spiral outward to find a land tile near (hx,hy) — handles cities whose dots sit just off-polygon.
      if(hx!==undefined&&!isLand(hx,hy)){
        outer:for(let r=4;r<=80;r+=4){
          for(let a=0;a<16;a++){
            const ang=a*Math.PI/8;
            const tx=hx+Math.cos(ang)*r,ty=hy+Math.sin(ang)*r;
            if(isLand(tx,ty)){hx=tx;hy=ty;break outer}
          }
        }
      }
      playerS._home={x:hx,y:hy};
      if(hx!==undefined){playerS.x=hx;playerS.y=hy}
    }
    // Drowning timer: counts up while player is in open water with no boat. Respawns after ~1.5s.
    const home=playerS._home;
    if(home&&!isLand(playerS.x,playerS.y)){
      let nb=false;
      for(const u of worldStructures){
        const ud=WORLD_BUILDS.find(b=>b.id===u.type);
        if(!ud||!ud.naval||(u.hp||0)<=0)continue;
        if(Math.hypot(u.x-playerS.x,u.y-playerS.y)<35){nb=true;break}
      }
      if(nb){playerS._drown=0}
      else{
        playerS._drown=(playerS._drown||0)+1;
        if(playerS._drown>=90){
          playerS.x=home.x;playerS.y=home.y;playerS._drown=0;
          flash('🌊 Lost at sea — respawned at home','#9cf',1600);
        }
      }
    }else{playerS._drown=0}
    let pdx=0,pdy=0;
    if(keys['w'])pdy-=1;
    if(keys['s'])pdy+=1;
    if(keys['a'])pdx-=1;
    if(keys['d'])pdx+=1;
    if(pdx||pdy){
      const len=Math.hypot(pdx,pdy)||1;
      let sm=1;
      if(inForestAt(playerS.x,playerS.y))sm=.5;
      if(inSnowyAt(playerS.x,playerS.y))sm=Math.min(sm,.5);
      if(inMountainAt(playerS.x,playerS.y))sm=Math.min(sm,.5);
      const spd=(pdef.spd||.45)*sm*4; // 4x faster for responsive manual control
      const nx=playerS.x+pdx/len*spd,ny=playerS.y+pdy/len*spd;
      // Player can't cross open water unless a friendly boat is nearby.
      const onLand=isLand(nx,ny);
      let nearBoat=false;
      if(!onLand){
        for(const u of worldStructures){
          const ud=WORLD_BUILDS.find(b=>b.id===u.type);
          if(!ud||!ud.naval||(u.hp||0)<=0)continue;
          if(Math.hypot(u.x-nx,u.y-ny)<35){nearBoat=true;break}
        }
      }
      if(!inToxicGasAt(nx,ny)&&(onLand||nearBoat)){playerS.x=nx;playerS.y=ny}
    }
  }
  // Tick player grenades — arc travel, then AOE explode.
  for(let i=playerGrenades.length-1;i>=0;i--){
    const g=playerGrenades[i];
    g.t++;
    if(g.t>=g.dur){
      // Detonate
      const aoe=45,dmg=80;
      for(const h of hordes){
        if((h.hp||0)<=0)continue;
        if(Math.hypot(h.x-g.tx,h.y-g.ty)<aoe)h.hp-=dmg;
      }
      bomberBlasts.push({x:g.tx,y:g.ty,radius:aoe,dmg:0,t:0,dur:24});
      playerGrenades.splice(i,1);
    }
  }
  // Tick portal pulse animation
  for(const p of playerPortals)p.t++;
  if(scanActive>0)scanActive--;
  else if(scanCool>0)scanCool--;
  if(airstrikeCool>0)airstrikeCool--;
  if(nukeCool>0)nukeCool--;
  if(emDeployCool>0)emDeployCool--;
  if(mgStrikeCool>0)mgStrikeCool--;
  if(kamikazeCool>0)kamikazeCool--;
  if(carpetCool>0)carpetCool--;
  if(antimatterCool>0)antimatterCool--;
  if(d303Cool>0)d303Cool--;
  // Tick kamikaze planes — fly toward target firing MG, then explode AOE on impact.
  for(let i=pendingKamikazes.length-1;i>=0;i--){
    const k=pendingKamikazes[i];
    if(worldPrepTimer>0)continue;
    if(!k.exploded){
      const dx=k.tx-k.x,dy=k.ty-k.y,d=Math.hypot(dx,dy);
      if(d<=KAMIKAZE_SPEED+1){
        // Impact — AOE damage to hordes, structures (friendly fire), pandemic zones.
        for(const h of hordes){
          if(h.hp<=0)continue;
          if(Math.hypot(h.x-k.tx,h.y-k.ty)<KAMIKAZE_AOE)h.hp-=KAMIKAZE_DMG;
        }
        for(const s of worldStructures){
          const sd=WORLD_BUILDS.find(b=>b.id===s.type);
          if(!sd||(s.hp||0)<=0)continue;
          if(!sd.mobile&&!sd.hp)continue;
          if(Math.hypot(s.x-k.tx,s.y-k.ty)<KAMIKAZE_AOE)s.hp-=KAMIKAZE_DMG;
        }
        for(const z of PANDEMIC_ZONES){
          if((z.hp||0)<=0)continue;
          if(Math.hypot(z.x-k.tx,z.y-k.ty)<KAMIKAZE_AOE)z.hp-=KAMIKAZE_DMG;
        }
        bomberBlasts.push({x:k.tx,y:k.ty,radius:KAMIKAZE_AOE,dmg:KAMIKAZE_DMG,t:0,dur:30});
        k.exploded=true;k.deathT=0;
      }else{
        k.x+=dx/d*KAMIKAZE_SPEED;
        k.y+=dy/d*KAMIKAZE_SPEED;
        k.fireCool=(k.fireCool||0)-1;
        if(k.fireCool<=0){
          k.fireCool=KAMIKAZE_FIRE_RATE;
          // Fire MG at nearest horde within 90px of the plane.
          let target=null,minD=Infinity;
          for(const h of hordes){
            if(h.hp<=0)continue;
            const hd=Math.hypot(h.x-k.x,h.y-k.y);
            if(hd<90&&hd<minD){minD=hd;target=h}
          }
          if(target){
            target.hp-=KAMIKAZE_BULLET_DMG;
            worldProjectiles.push({x:k.x,y:k.y,sx:k.x,sy:k.y,tx:target.x,ty:target.y,t:0,dur:6,kind:'tracer'});
          }
        }
      }
    }
    if(k.exploded){
      k.deathT=(k.deathT||0)+1;
      if(k.deathT>40)pendingKamikazes.splice(i,1);
    }
  }
  // Tick carpet bomber — flies west→east across the target, dropping bombs at evenly spaced points.
  for(let i=pendingCarpets.length-1;i>=0;i--){
    const c=pendingCarpets[i];
    c.timer--;
    if(c.timer<=-60){pendingCarpets.splice(i,1);continue;}
    if(worldPrepTimer>0)continue;
    if(c.timer<=0)continue;
    const prog=1-c.timer/CARPET_DURATION;
    const px=c.x-CARPET_HALF_TRACK+(CARPET_HALF_TRACK*2)*prog;
    // Drop logic — at each progress fraction matching a bomb slot, detonate one bomb at that x position.
    while(c.dropped<CARPET_BOMBS && prog>=(c.dropped+0.5)/CARPET_BOMBS){
      const bx=c.x-CARPET_HALF_TRACK+(CARPET_HALF_TRACK*2)*((c.dropped+0.5)/CARPET_BOMBS);
      const by=c.y;
      // Detonate bomb at (bx,by) — AOE damage and visual blast.
      for(const h of hordes){
        if(h.hp<=0)continue;
        if(Math.hypot(h.x-bx,h.y-by)<CARPET_BOMB_AOE)h.hp-=CARPET_BOMB_DMG;
      }
      for(const s of worldStructures){
        const sd=WORLD_BUILDS.find(b=>b.id===s.type);
        if(!sd||(s.hp||0)<=0)continue;
        if(!sd.mobile&&!sd.hp)continue;
        if(Math.hypot(s.x-bx,s.y-by)<CARPET_BOMB_AOE)s.hp-=CARPET_BOMB_DMG;
      }
      for(const z of PANDEMIC_ZONES){
        if((z.hp||0)<=0)continue;
        if(Math.hypot(z.x-bx,z.y-by)<CARPET_BOMB_AOE)z.hp-=CARPET_BOMB_DMG;
      }
      bomberBlasts.push({x:bx,y:by,radius:CARPET_BOMB_AOE,dmg:CARPET_BOMB_DMG,t:0,dur:28});
      c.dropped++;
    }
  }
  // Tick antimatter missiles — phase machine: flight → expand (black hole grows) → suck (pull + ring shrinks) → explode.
  for(let i=pendingAntimatters.length-1;i>=0;i--){
    const a=pendingAntimatters[i];
    if(a.phase==='done'){pendingAntimatters.splice(i,1);continue;}
    if(worldPrepTimer>0)continue;
    a.t++;
    if(a.phase==='flight'){
      if(a.t>=ANTIMATTER_FLIGHT){
        // Hit — micro-splash deals 1 damage to nearby hordes.
        forHordesInRadius(a.tx,a.ty,ANTIMATTER_HIT_AOE,h=>{ h.hp-=ANTIMATTER_HIT_DMG; });
        bomberBlasts.push({x:a.tx,y:a.ty,radius:ANTIMATTER_HIT_AOE,dmg:ANTIMATTER_HIT_DMG,t:0,dur:14});
        a.phase='expand';a.t=0;
      }
    }else if(a.phase==='expand'){
      // Black hole grows from 0 → ANTIMATTER_BH_RADIUS over ANTIMATTER_EXPAND frames.
      if(a.t>=ANTIMATTER_EXPAND){a.phase='suck';a.t=0;}
    }else if(a.phase==='suck'){
      // Pull all nearby hordes toward (tx,ty); ring shrinks BH_RADIUS → 0.
      const k=a.t/ANTIMATTER_SUCK; // 0..1
      const ringR=ANTIMATTER_BH_RADIUS*(1-k);
      // Pull hordes within current ring; pull strength scales with closeness to ring edge.
      forHordesInRadius(a.tx,a.ty,ANTIMATTER_BH_RADIUS,(h,d)=>{
        if(d<2)return;
        const pull=ANTIMATTER_PULL*(1-d/ANTIMATTER_BH_RADIUS+0.2);
        const ux=(a.tx-h.x)/d, uy=(a.ty-h.y)/d;
        h.x+=ux*pull; h.y+=uy*pull;
      });
      // Also pull friendly mobile units toward the singularity (it's antimatter — friendly fire).
      for(const s of worldStructures){
        const sd=WORLD_BUILDS.find(b=>b.id===s.type);
        if(!sd||!sd.mobile||(s.hp||0)<=0)continue;
        const dx=a.tx-s.x,dy=a.ty-s.y,d=Math.hypot(dx,dy)||1;
        if(d>ANTIMATTER_BH_RADIUS)continue;
        const pull=ANTIMATTER_PULL*(1-d/ANTIMATTER_BH_RADIUS+0.2)*.7;
        s.x+=dx/d*pull; s.y+=dy/d*pull;
      }
      a.ringR=ringR;
      if(a.t>=ANTIMATTER_SUCK){
        // Final detonation — 1000 dmg in small splash. Friendly fire too.
        forHordesInRadius(a.tx,a.ty,ANTIMATTER_EXPLODE_AOE,h=>{ h.hp-=ANTIMATTER_EXPLODE_DMG; });
        for(const s of worldStructures){
          const sd=WORLD_BUILDS.find(b=>b.id===s.type);
          if(!sd||(s.hp||0)<=0)continue;
          if(!sd.mobile&&!sd.hp)continue;
          if(Math.hypot(s.x-a.tx,s.y-a.ty)<ANTIMATTER_EXPLODE_AOE)s.hp-=ANTIMATTER_EXPLODE_DMG;
        }
        for(const z of PANDEMIC_ZONES){
          if((z.hp||0)<=0)continue;
          if(Math.hypot(z.x-a.tx,z.y-a.ty)<ANTIMATTER_EXPLODE_AOE)z.hp-=ANTIMATTER_EXPLODE_DMG;
        }
        bomberBlasts.push({x:a.tx,y:a.ty,radius:ANTIMATTER_EXPLODE_AOE,dmg:ANTIMATTER_EXPLODE_DMG,t:0,dur:36});
        a.phase='explode';a.t=0;
      }
    }else if(a.phase==='explode'){
      if(a.t>=ANTIMATTER_EXPLODE)a.phase='done';
    }
  }
  // Tick D-303 missiles — flight from Japan → impact wipes ~all of China to dust + leaves a 120s toxic zone.
  for(let i=pendingD303s.length-1;i>=0;i--){
    const d=pendingD303s[i];
    if(d.phase==='done'){pendingD303s.splice(i,1);continue;}
    if(worldPrepTimer>0)continue;
    d.t++;
    if(d.phase==='flight'){
      if(d.t>=D303_FLIGHT){
        // IMPACT — 5×10¹⁸ damage to everything in the wide AOE.
        // Hordes vaporize.
        forHordesInRadius(d.tx,d.ty,D303_AOE,h=>{ h.hp=-D303_DMG; });
        // Player units & structures vaporize, marked _dusted so they DON'T reanimate.
        for(const s of worldStructures){
          if((s.hp||0)<=0)continue;
          if(Math.hypot(s.x-d.tx,s.y-d.ty)<D303_AOE){ s._dusted=true; s.hp=-D303_DMG; }
        }
        // Pandemic zones obliterated.
        for(const z of PANDEMIC_ZONES){
          if((z.hp||0)<=0)continue;
          if(Math.hypot(z.x-d.tx,z.y-d.ty)<D303_AOE)z.hp=-D303_DMG;
        }
        // Cities inside the blast → scorched (no civilians, no respawn).
        for(const c of WORLD_CITIES){
          if(Math.hypot(c.x-d.tx,c.y-d.ty)<D303_AOE){
            c.status='scorched'; c._dusted=true;
            if(defenses[c.id])delete defenses[c.id];
          }
        }
        // Leave a persistent toxic zone for 120s.
        TOXIC_ZONES.push({x:d.tx,y:d.ty,r:D303_AOE,timer:D303_TOXIC_DURATION,maxTimer:D303_TOXIC_DURATION});
        bomberBlasts.push({x:d.tx,y:d.ty,radius:D303_AOE,dmg:D303_DMG,t:0,dur:60});
        flash(`☣ D-303 IMPACT — region scorched · 120s toxic zone`,'#9f6',3200);
        d.phase='impact';d.t=0;
      }
    }else if(d.phase==='impact'){
      if(d.t>=60)d.phase='done';
    }
  }
  // Tick toxic zones — countdown timer; any unit/horde-target inside gets instantly zombified.
  for(let i=TOXIC_ZONES.length-1;i>=0;i--){
    const z=TOXIC_ZONES[i];
    z.timer--;
    if(z.timer<=0){TOXIC_ZONES.splice(i,1);continue;}
    if(worldPrepTimer>0)continue;
    // Friendly units that wander in → instantly zombified (turn into a horde at their spot).
    for(let j=worldStructures.length-1;j>=0;j--){
      const s=worldStructures[j];
      const sd=WORLD_BUILDS.find(b=>b.id===s.type);
      if(!sd||!sd.mobile||(s.hp||0)<=0)continue;
      if(sd.naval||sd.noInfect)continue; // ships and mechs aren't infectable
      if(Math.hypot(s.x-z.x,s.y-z.y)<z.r){
        const tgt=pickHordeTarget(s.x,s.y);
        if(tgt)makeHorde(s.x,s.y,2,tgt);
        s.hp=0; // killed (will be despawned by normal cleanup; not _dusted, the horde is the conversion)
        flash(`☣ ${sd.name} infected by toxic zone`,'#9f6',1200);
      }
    }
  }
  // Tick pending MG strafes — plane orbits over the target spot (top-down view), strafing zombies in the kill zone.
  for(let i=pendingMGStrikes.length-1;i>=0;i--){
    const m=pendingMGStrikes[i];
    m.timer--;
    if(m.timer<=0){pendingMGStrikes.splice(i,1);continue;}
    if(worldPrepTimer>0)continue;
    m.fireCool=(m.fireCool||0)-1;
    if(m.fireCool<=0){
      m.fireCool=MGSTRIKE_RATE;
      // Pick the closest horde inside the kill zone (radius MGSTRIKE_CORRIDOR around target spot).
      let target=null,minD=Infinity;
      for(const h of hordes){
        if(h.hp<=0)continue;
        const d=Math.hypot(h.x-m.x,h.y-m.y);
        if(d<MGSTRIKE_CORRIDOR&&d<minD){minD=d;target=h}
      }
      if(target){
        target.hp-=MGSTRIKE_DMG;
        worldProjectiles.push({x:m.x,y:m.y,sx:m.x,sy:m.y,tx:target.x,ty:target.y,t:0,dur:6,kind:'tracer'});
      }
      // Friendly fire — chip player units inside the kill zone too.
      for(const s of worldStructures){
        const sd=WORLD_BUILDS.find(b=>b.id===s.type);
        if(!sd||(s.hp||0)<=0)continue;
        if(!sd.mobile&&!sd.hp)continue;
        if(Math.hypot(s.x-m.x,s.y-m.y)<MGSTRIKE_CORRIDOR*.7){
          s.hp-=MGSTRIKE_DMG*.4;
        }
      }
    }
  }
  // Tick pending airstrikes — when timer hits 0, deal AOE to hordes, pandemic zones,
  // AND friendly mobile divisions inside the blast radius (friendly fire).
  for(let i=pendingAirstrikes.length-1;i>=0;i--){
    const a=pendingAirstrikes[i];
    a.timer--;
    if(a.timer<=0&&!a.detonated){
      a.detonated=true;
      // Pilots can't see through pandemic fog — strike fails to land if target is fogged.
      if(inPandemicFogAt(a.x,a.y)&&scanActive<=0){
        a.failed=true;
        flash(`✈ Airstrike LOST in fog — no damage`,'#f66',2200);
      }else{
        for(const h of hordes){
          if(h.hp<=0)continue;
          if(Math.hypot(h.x-a.x,h.y-a.y)<AIRSTRIKE_AOE)h.hp-=AIRSTRIKE_DMG;
        }
        for(const z of PANDEMIC_ZONES){
          if((z.hp||0)<=0)continue;
          if(Math.hypot(z.x-a.x,z.y-a.y)<AIRSTRIKE_AOE)z.hp-=AIRSTRIKE_DMG;
        }
        // Friendly fire — soldiers and artillery cannons in the blast die too.
        for(const s of worldStructures){
          const sd=WORLD_BUILDS.find(b=>b.id===s.type);
          if(!sd||(s.hp||0)<=0)continue;
          if(!sd.mobile&&s.type!=='cannon'&&s.type!=='fort')continue;
          if(Math.hypot(s.x-a.x,s.y-a.y)<AIRSTRIKE_AOE)s.hp-=AIRSTRIKE_DMG;
        }
      }
    }
    if(a.timer<=-25)pendingAirstrikes.splice(i,1);
  }
  // Tick pending nukes — same shape as airstrikes but with massive AOE & friendly-fire.
  for(let i=pendingNukes.length-1;i>=0;i--){
    const n=pendingNukes[i];
    n.timer--;
    if(n.timer<=0&&!n.detonated){
      n.detonated=true;
      for(const h of hordes){
        if(h.hp<=0)continue;
        if(Math.hypot(h.x-n.x,h.y-n.y)<NUKE_AOE)h.hp-=NUKE_DMG;
      }
      for(const z of PANDEMIC_ZONES){
        if((z.hp||0)<=0)continue;
        if(Math.hypot(z.x-n.x,z.y-n.y)<NUKE_AOE)z.hp-=NUKE_DMG;
      }
      // Friendly fire — anything inside the radius is gone, including FOBs and divisions.
      for(const s of worldStructures){
        const sd=WORLD_BUILDS.find(b=>b.id===s.type);
        if(!sd||(s.hp||0)<=0)continue;
        // skip pure aura buildings without HP (wire, hospital, checkpoint, cannon = hp 0)
        if(!sd.mobile&&!sd.hp)continue;
        if(Math.hypot(s.x-n.x,s.y-n.y)<NUKE_AOE)s.hp-=NUKE_DMG;
      }
      flash(`☢ NUCLEAR DETONATION`,'#fa3',3000);
    }
    if(n.timer<=-60)pendingNukes.splice(i,1);
  }
  // 5 seconds before prep ends → D42 and Area 51 fire their opening 5-horde salvo each.
  if(worldPrepTimer===300){
    PANDEMIC_ZONES.forEach(z=>{
      if((z.openingBurst||0)<=0||(z.hp||0)<=0)return;
      for(let i=0;i<z.openingBurst;i++){
        const tgt=pickHordeTarget(z.x,z.y);
        if(tgt){
          const sz=2+Math.floor(Math.random()*3);
          makeHorde(z.x+(Math.random()-.5)*120,z.y+(Math.random()-.5)*120,sz,tgt,rollMutation());
        }
      }
      flash(`⚠ ${z.name} unleashed an opening swarm`,'#f66',2400);
      z.openingBurst=0;
    });
  }
  worldGoldTick++;
  if(worldGoldTick>=60){
    let inc=2;worldStructures.forEach(s=>{if(s.type==='fob')inc+=10});
    worldGold+=inc;worldGoldTick=0;
  }
  if(worldPrepTimer<=0){
    hordeSpawnTimer--;
    if(hordeSpawnTimer<=0){spawnHorde();hordeSpawnTimer=Math.max(22,90-worldDay*1.5)}
    // Pandemic zones pour out hordes endlessly (until destroyed). Each zone has its own flavor.
    PANDEMIC_ZONES.forEach(z=>{
      z.pulse=(z.pulse||0)+1;
      if((z.hp||0)<=0)return;
      // Each origin zone deploys an Alpha when its HP falls below the trigger.
      // Only one Alpha per zone at a time. If the Alpha dies, a replacement spawns
      // the next time the zone is hit (until the zone itself is destroyed).
      // Alpha type is keyed off the zone's kind:
      //   spread (Banda) → Summoner Alpha (medium HP/dmg, summons meat shield)
      //   mass   (D42)   → Rusher Alpha  (fast & deadly)
      //   alpha  (Area51)→ classic tank Alpha (huge HP, brute speed)
      if(z.cityId==null && z.hp<=ALPHA_HP_TRIGGER){
        const alphaAlive=hordes.some(h=>h===z.alphaRef&&h.hp>0);
        if(!alphaAlive){
          const tgt=pickHordeTarget(z.x,z.y);
          if(tgt){
            const mut=z.kind==='spread'?'alphaSummoner':z.kind==='mass'?'alphaRunner':'alpha';
            makeHorde(z.x,z.y,4,tgt,mut);
            const a=hordes[hordes.length-1];
            a.zone=z; // back-link so summoner can spawn shield around itself
            z.alphaRef=a;
            const lbl=mut==='alphaSummoner'?'SUMMONER ALPHA':mut==='alphaRunner'?'RUSHER ALPHA':'ALPHA ZOMBIE';
            flash(`☠ ${lbl} emerged from ${z.name}`,'#f44',2800);
          }
        }
      }
      z.spawnTimer--;
      if(z.spawnTimer<=0){
        if(z.kind==='mass'){
          // D42: spits out 2–3 hordes per pulse
          const burst=2+Math.floor(Math.random()*2);
          for(let i=0;i<burst;i++){
            const tgt=pickHordeTarget(z.x,z.y);
            if(tgt){
              const sz=2+Math.floor(Math.random()*3);
              makeHorde(z.x+(Math.random()-.5)*90,z.y+(Math.random()-.5)*90,sz,tgt,rollMutation());
            }
          }
          z.spawnTimer=55+Math.floor(Math.random()*30);
        }else if(z.kind==='spread'){
          // Banda Sea: rapid bursts, far island reach
          const tgt=pickHordeTarget(z.x,z.y);
          if(tgt){
            const sz=2+Math.floor(Math.random()*3);
            makeHorde(z.x+(Math.random()-.5)*180,z.y+(Math.random()-.5)*180,sz,tgt,rollMutation());
          }
          z.spawnTimer=22+Math.floor(Math.random()*15);
        }else if(z.kind==='alpha'){
          // Area 51: heavy mutations — bias toward runner/brute
          const tgt=pickHordeTarget(z.x,z.y);
          if(tgt){
            const sz=2+Math.floor(Math.random()*3);
            const r=Math.random();
            const mut=worldDay<15?'normal':(r<.5?'brute':r<.85?'runner':'normal');
            makeHorde(z.x+(Math.random()-.5)*70,z.y+(Math.random()-.5)*70,sz,tgt,mut);
          }
          z.spawnTimer=45+Math.floor(Math.random()*25);
        }else{
          const tgt=pickHordeTarget(z.x,z.y);
          if(tgt){
            const sz=2+Math.floor(Math.random()*3);
            makeHorde(z.x+(Math.random()-.5)*70,z.y+(Math.random()-.5)*70,sz,tgt,rollMutation());
          }
          z.spawnTimer=40+Math.floor(Math.random()*30);
        }
      }
    });
  }
  // ── TOXIC GAS BURSTS (after day 50) ──
  if(worldDay>=GAS_FIRST_DAY&&worldPrepTimer<=0){
    gasSpawnTimer--;
    if(gasSpawnTimer<=0){
      // Pick a random land position, avoiding pandemic zones and existing gas
      let tries=0,gx=0,gy=0,ok=false;
      while(tries++<40){
        gx=200+Math.random()*(MAP_W-400);
        gy=200+Math.random()*(MAP_H-400);
        if(!isLand(gx,gy))continue;
        let near=false;
        for(const z of PANDEMIC_ZONES)if(Math.hypot(gx-z.x,gy-z.y)<180){near=true;break}
        for(const g of GAS_ZONES)if(Math.hypot(gx-g.x,gy-g.y)<150){near=true;break}
        if(!near){ok=true;break}
      }
      if(ok){
        GAS_ZONES.push({x:gx,y:gy,age:0,r:55+Math.random()*25,deployTimer:0});
        flash(`☢ TOXIC GAS DETECTED — incoming swarm in 10s`,'#ff8',2500);
      }
      gasSpawnTimer=GAS_INTERVAL;
    }
  }
  // Tick gas zones
  for(let i=GAS_ZONES.length-1;i>=0;i--){
    const g=GAS_ZONES[i];
    g.age++;
    if(g.age>=GAS_WARN_TIME){
      g.deployTimer--;
      if(g.deployTimer<=0){
        const tgt=pickHordeTarget(g.x,g.y);
        if(tgt){
          const sz=1+Math.floor(Math.random()*2);
          makeHorde(g.x+(Math.random()-.5)*g.r,g.y+(Math.random()-.5)*g.r,sz,tgt,rollMutation());
        }
        g.deployTimer=70+Math.floor(Math.random()*50); // ~1.2–2s between spawns
      }
    }
    if(g.age>=GAS_LIFE)GAS_ZONES.splice(i,1);
  }
  // Remove destroyed zones and mark their associated city as deserted (immune to re-infection)
  for(let i=PANDEMIC_ZONES.length-1;i>=0;i--){
    const z=PANDEMIC_ZONES[i];
    if((z.hp||0)<=0){
      if(z.cityId){
        const c=WORLD_CITIES.find(x=>x.id===z.cityId);
        if(c){c.status='deserted';c.attackedTimer=0;c.fallTimer=0;c.sealTimer=0}
      }
      flash(`✓ ${z.name} cleared — area deserted`,'#4f4',2400);
      PANDEMIC_ZONES.splice(i,1);
    }
  }
  updateHordes();
  updateWorldStructures();
  // Player division: fire on E after cooldown tick (same tick as AI units) — avoids double shots / held-key spam.
  {
    const playerS=worldStructures.find(u=>u._player&&(u.hp||0)>0);
    if(playerS){
      const pdef=PLAYER_WORLD_WEAPONS[playerS._weapon]||PLAYER_WORLD_WEAPONS.rifle;
      const kind=pdef.kind||'ranged';
      const t=playerS.target;
      const firing=!!keys['e'];
      if(pdef&&pdef.warmup){
        playerS._gatWarm=firing?Math.min(pdef.warmup,(playerS._gatWarm||0)+1):0;
      }else{
        playerS._gatWarm=0;
      }
      const warmReady=!pdef.warmup||(playerS._gatWarm>=pdef.warmup);
      // Track per-weapon ammo (only for weapons that define an `ammo` field).
      if(pdef.ammo!=null){
        if(playerS._ammo==null||playerS._ammoWeapon!==playerS._weapon){
          playerS._ammoWeapon=playerS._weapon;playerS._ammo=pdef.ammo;
        }
      }
      const ammoOk=pdef.ammo==null||(playerS._ammo||0)>0;
      const consumeAmmo=()=>{
        if(pdef.ammo!=null){
          playerS._ammo--;
          if(playerS._ammo<=0)flash(`${pdef.name} out of ammo`,'#f66',1400);
        }
      };
      if(firing&&pdef&&worldPrepTimer<=0&&warmReady&&ammoOk&&(playerS.cooldown||0)<=0){
        if(kind==='ranged'){
          if(t&&(t.hp||0)>0){
            const d=Math.hypot(t.x-playerS.x,t.y-playerS.y);
            if(d<pdef.range){
              if(pdef.aoe){
                forHordesInRadius(t.x,t.y,pdef.aoe,h2=>{ h2.hp-=pdef.dmg; });
                for(const z of PANDEMIC_ZONES){
                  if((z.hp||0)<=0)continue;
                  if(Math.hypot(z.x-t.x,z.y-t.y)<pdef.aoe)z.hp-=pdef.dmg;
                }
              }else{
                t.hp-=pdef.dmg;
              }
              playerS.cooldown=shotCooldown(pdef);playerS.flash=8;
              spawnTracer(playerS,t,pdef);
              consumeAmmo();
            }
          }
        }else if(kind==='melee'){
          // Point-blank damage check — hit any horde within pdef.range of the player.
          let hit=false;
          forHordesInRadius(playerS.x,playerS.y,pdef.range,h2=>{
            if(pdef.aoe){
              forHordesInRadius(h2.x,h2.y,pdef.aoe,h3=>{ h3.hp-=pdef.dmg; });
            }else{
              h2.hp-=pdef.dmg;
            }
            hit=true;
          });
          if(hit){
            playerS.cooldown=shotCooldown(pdef);playerS.flash=8;
            consumeAmmo();
          }
        }else if(kind==='thrown'){
          // Toss grenade in arc from player toward cursor, capped to pdef.range.
          const wx=(mouseX-canvas.width/2)/wCam.zoom+wCam.x;
          const wy=(mouseY-canvas.height/2)/wCam.zoom+wCam.y;
          const dx=wx-playerS.x,dy=wy-playerS.y;
          const dd=Math.hypot(dx,dy)||1;
          const cap=pdef.range||120;
          const tx=dd>cap?playerS.x+dx/dd*cap:wx;
          const ty=dd>cap?playerS.y+dy/dd*cap:wy;
          playerGrenades.push({sx:playerS.x,sy:playerS.y,tx,ty,t:0,dur:42});
          playerS.cooldown=shotCooldown(pdef);playerS.flash=8;
          consumeAmmo();
        }else if(kind==='warper'){
          // 1st press → place portal A, 2nd → place portal B, 3rd → teleport to A; cycle.
          const step=playerS._warperStep||0;
          if(step===0){
            playerPortals.length=0;
            playerPortals.push({x:playerS.x,y:playerS.y,t:0});
            flash('⊙ Portal A placed','#9cf',1000);
            playerS._warperStep=1;
          }else if(step===1){
            playerPortals.push({x:playerS.x,y:playerS.y,t:0});
            flash('⊙ Portal B placed','#fc6',1000);
            playerS._warperStep=2;
          }else{
            const a=playerPortals[0];
            if(a){playerS.x=a.x;playerS.y=a.y;flash('⊙ Teleported to A','#c9f',1000);}
            playerS._warperStep=0;
          }
          playerS.cooldown=shotCooldown(pdef);playerS.flash=8;
        }
      }
    }
  }
  updateWorldProjectiles();
  updateAttackedCities();
}

// ── DEFENSE SIM (per-city) ──────────────────────────────────────────────
function startWaveS(s){
  s.wave++;s.betweenWaves=false;
  const count=4+s.wave*2;s.spawnQueue=[];
  for(let i=0;i<count;i++){
    const isBoss=(i===count-1)&&s.wave>=3;
    const sp=s.def.spawns[Math.floor(Math.random()*s.def.spawns.length)];
    s.spawnQueue.push({
      delay:i*60+Math.random()*30,
      hp:(isBoss?420:35+s.wave*12)*s.def.diff,
      spd:(isBoss?.45:.6+Math.random()*.3)*(1+s.wave*.04),
      boss:isBoss,spawn:sp
    });
  }
  if(s.id===viewedDefId)flash(`⚠ WAVE ${s.wave} — ${s.def.name}`,'#f44',2000);
}
function spawnZombieS(s,d){
  const px=tilePxFor(s,d.spawn.col,d.spawn.row);
  s.zombies.push({
    x:px.x+(Math.random()-.5)*16,y:px.y+(Math.random()-.5)*16,
    col:d.spawn.col,row:d.spawn.row,
    hp:d.hp,maxHp:d.hp,spd:d.spd,boss:d.boss,
    path:[],pathTimer:0
  });
}
function flash(text,color,dur){
  waveMsgEl.textContent=text;waveMsgEl.style.color=color;waveMsgEl.style.display='block';
  clearTimeout(flash._t);flash._t=setTimeout(()=>waveMsgEl.style.display='none',dur||2000);
}
function particleS(s,x,y,color){
  const a=Math.random()*Math.PI*2,sp=.4+Math.random()*.9;
  s.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:25+Math.random()*15,max:40,color});
}
function stepAlongPath(u,sp,s){
  if(!u.path||u.path.length===0)return false;
  const next=u.path[0],npx=tilePxFor(s,next.col,next.row);
  const dx=npx.x-u.x,dy=npx.y-u.y,d=Math.hypot(dx,dy);
  if(d<sp+1){u.x=npx.x;u.y=npx.y;u.col=next.col;u.row=next.row;u.path.shift();return true}
  u.x+=dx/d*sp;u.y+=dy/d*sp;
  return false;
}
function ensurePath(u,tc,tr){
  if(u.col===tc&&u.row===tr){u.path=[];return}
  if(u.pathTC!==tc||u.pathTR!==tr||u.pathTimer<=0||u.path.length===0){
    u.pathTC=tc;u.pathTR=tr;u.path=bfs(u.col,u.row,tc,tr)||[];u.pathTimer=45+Math.floor(Math.random()*15);
  }
}
function updateSoldierS(s,u){
  u.pathTimer--;
  let target=null,minD=Infinity;
  for(const z of s.zombies){const d=Math.hypot(z.x-u.x,z.y-u.y);if(d<minD){minD=d;target=z}}
  if(!target){
    u.state='idle';
    const dHQ=Math.hypot(u.x-s.hqpx.x,u.y-s.hqpx.y);
    if(dHQ>TILE*1.5)ensurePath(u,s.hq.col,s.hq.row);else u.path=[];
  }else{
    if(minD<u.type.retreat){u.state='retreat';ensurePath(u,s.hq.col,s.hq.row)}
    else if(minD<u.type.range){
      u.state='engage';u.path=[];u.fireTimer++;
      if(u.fireTimer>=u.type.rate){u.fireTimer=0;s.bullets.push({x:u.x,y:u.y,target,spd:6,dmg:u.type.dmg,color:u.type.color,aoe:u.type.aoe||0})}
    }else{
      u.state='approach';ensurePath(u,target.col,target.row);
    }
  }
  if(u.state==='approach'||u.state==='retreat'||u.state==='idle')stepAlongPath(u,u.type.spd,s);
  if(target&&u.state==='approach'&&minD<u.type.range){
    u.fireTimer++;
    if(u.fireTimer>=u.type.rate){u.fireTimer=0;s.bullets.push({x:u.x,y:u.y,target,spd:6,dmg:u.type.dmg,color:u.type.color,aoe:u.type.aoe||0})}
  }
}
function updatePlayer(s){
  const p=s.player;if(!p)return;
  if(p.respawn>0){
    p.respawn--;
    if(p.respawn<=0){p.x=s.hqpx.x;p.y=s.hqpx.y+24;p.hp=p.maxHp}
    return;
  }
  // Movement (only if currently viewed defense — keyboard input only steers viewed)
  if(s.id===viewedDefId){
    let mx=0,my=0;
    if(keys['w']||keys['arrowup'])my-=1;
    if(keys['s']||keys['arrowdown'])my+=1;
    if(keys['a']||keys['arrowleft'])mx-=1;
    if(keys['d']||keys['arrowright'])mx+=1;
    const len=Math.hypot(mx,my);
    if(len>0){
      const sp=2.2;p.x+=mx/len*sp;p.y+=my/len*sp;
      // Aim follows movement direction; idle = keep last aim
      p.aim=Math.atan2(my,mx);
    }
  }
  // Constrain to map area
  const minX=s.offset.x+8,maxX=s.offset.x+GRID_W*TILE-8;
  const minY=s.offset.y+8,maxY=s.offset.y+GRID_H*TILE-8;
  if(p.x<minX)p.x=minX;if(p.x>maxX)p.x=maxX;
  if(p.y<minY)p.y=minY;if(p.y>maxY)p.y=maxY;
  // Damage from nearby zombies
  for(const z of s.zombies){
    if(Math.hypot(z.x-p.x,z.y-p.y)<18)p.hp-=.22*(z.boss?2.5:1);
  }
  // Shoot
  p.fireTimer--;
  const w=WEAPONS.find(x=>x.id===p.weapon);
  if(w&&s.id===viewedDefId&&(mouseDown||keys['e'])&&p.fireTimer<=0){
    p.fireTimer=w.rate;
    s.pBullets.push({
      x:p.x+Math.cos(p.aim)*10,y:p.y+Math.sin(p.aim)*10,
      vx:Math.cos(p.aim)*w.spd,vy:Math.sin(p.aim)*w.spd,
      dmg:w.dmg,life:Math.ceil(w.range/w.spd),aoe:w.aoe||0,color:w.color
    });
    // Muzzle flash particle
    for(let i=0;i<3;i++)particleS(s,p.x+Math.cos(p.aim)*12,p.y+Math.sin(p.aim)*12,w.color);
  }
  if(p.hp<=0){
    for(let i=0;i<14;i++)particleS(s,p.x,p.y,'#f44');
    p.respawn=300; // ~5s
    if(s.id===viewedDefId)flash('☠ You died — respawning…','#f66',2000);
  }
}
function updatePlayerBullets(s){
  s.pBullets=s.pBullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0)return false;
    for(const z of s.zombies){
      if(Math.hypot(z.x-b.x,z.y-b.y)<(b.aoe>0?10:12)){
        if(b.aoe>0){
          s.zombies.forEach(zz=>{if(Math.hypot(zz.x-b.x,zz.y-b.y)<b.aoe)zz.hp-=b.dmg});
          for(let i=0;i<14;i++)particleS(s,b.x,b.y,'#f8a');
        }else{
          z.hp-=b.dmg;
          for(let i=0;i<3;i++)particleS(s,z.x,z.y,b.color);
        }
        return false;
      }
    }
    return true;
  });
}
function updateZombieS(s,z){
  z.pathTimer--;
  ensurePath(z,s.hq.col,s.hq.row);
  stepAlongPath(z,z.spd,s);
  for(const u of s.soldiers){if(Math.hypot(u.x-z.x,u.y-z.y)<22)u.hp-=.18*(z.boss?2.5:1)}
  if(Math.hypot(z.x-s.hqpx.x,z.y-s.hqpx.y)<TILE*.7){
    z.escaped=true;s.lives--;
    for(let i=0;i<5;i++)particleS(s,s.hqpx.x,s.hqpx.y,'#f44');
  }
}
function updateOneDefense(s){
  if(s.result)return;
  s.waveTimer++;s.goldTick++;
  if(s.goldTick>=120){s.gold+=18+s.wave*3;s.goldTick=0}
  if(s.prepActive){
    // Only count down prep once a horde has actually arrived at this city
    const wc=WORLD_CITIES.find(c=>c.id===s.id);
    const hordeHere=wc&&wc.status==='attacked';
    s.awaitingHorde=!hordeHere;
    if(hordeHere){
      s.nextWaveDelay--;
      if(s.nextWaveDelay<=0){s.prepActive=false;s.betweenWaves=true;s.nextWaveDelay=120}
    }
  }else{
    s.spawnQueue.forEach(q=>q.delay--);
    s.spawnQueue.filter(q=>q.delay<=0).forEach(q=>spawnZombieS(s,q));
    s.spawnQueue=s.spawnQueue.filter(q=>q.delay>0);
  }
  s.zombies.forEach(z=>updateZombieS(s,z));
  s.zombies=s.zombies.filter(z=>!z.escaped);
  s.soldiers.forEach(u=>updateSoldierS(s,u));
  updatePlayer(s);
  updatePlayerBullets(s);
  s.bullets=s.bullets.filter(b=>{
    if(!b.target||b.target.hp<=0)return false;
    const dx=b.target.x-b.x,dy=b.target.y-b.y,d=Math.hypot(dx,dy);
    if(d<b.spd+2){
      if(b.aoe>0){
        s.zombies.forEach(z=>{if(Math.hypot(z.x-b.target.x,z.y-b.target.y)<b.aoe){z.hp-=b.dmg;particleS(s,z.x,z.y,'#c6f')}});
        for(let i=0;i<10;i++)particleS(s,b.target.x,b.target.y,'#f8a');
      }else{
        b.target.hp-=b.dmg;
        for(let i=0;i<3;i++)particleS(s,b.target.x,b.target.y,b.color);
      }
      return false;
    }
    b.x+=dx/d*b.spd;b.y+=dy/d*b.spd;return true;
  });
  s.zombies=s.zombies.filter(z=>{if(z.hp<=0){s.gold+=z.boss?80:8+s.wave;for(let i=0;i<6;i++)particleS(s,z.x,z.y,'#3f3');return false}return true});
  s.soldiers=s.soldiers.filter(u=>{if(u.hp<=0){for(let i=0;i<10;i++)particleS(s,u.x,u.y,'#f44');return false}return true});
  s.particles.forEach(p=>{p.life--;p.x+=p.vx;p.y+=p.vy});
  s.particles=s.particles.filter(p=>p.life>0);
  if(s.lives<=0){s.lives=0;s.result='lose';const wc=WORLD_CITIES.find(c=>c.id===s.id);if(wc)wc.status='fallen';onDefenseEnd(s);return}
  if(!s.prepActive){
    const allDone=s.zombies.length===0&&s.spawnQueue.length===0;
    if(!s.betweenWaves&&allDone){s.betweenWaves=true;s.nextWaveDelay=420;if(s.wave<s.maxWaves&&s.id===viewedDefId)flash(`✓ Wave ${s.wave} cleared — ${s.def.name}`,'#4f4',1500)}
    if(s.betweenWaves&&allDone){
      s.nextWaveDelay--;
      if(s.nextWaveDelay<=0){
        if(s.wave>=s.maxWaves){s.result='win';const wc=WORLD_CITIES.find(c=>c.id===s.id);if(wc)wc.status='saved';onDefenseEnd(s);return}
        startWaveS(s);
      }
    }
  }
}

function onDefenseEnd(s){
  const w=s.result==='win';
  if(w){
    if(s.id===viewedDefId){
      screen='result';
      showDialog('CITY SAVED',`${s.def.name}, ${s.def.country}`,
        'Your forces held the line.\nThe survivors have been evacuated.',
        [{label:'RETURN TO MAP',onClick:exitDefenseAfterResult}]);
    }else{
      flash(`✓ ${s.def.name} SAVED`,'#4f4',2400);
      delete defenses[s.id];
    }
  }else{
    // Lost — go through fallen-city flow (presents 3 choices)
    cityFell(s.id,'overrun');
  }
}

function updateAllDefenses(){
  Object.values(defenses).forEach(updateOneDefense);
}

// ── DRAWING ──────────────────────────────────────────────────────────────
